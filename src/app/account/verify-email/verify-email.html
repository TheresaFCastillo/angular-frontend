<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card mt-5">
                <div class="card-body text-center">
                    <div *ngIf="status === EmailVerificationStatus.Verifying">
                        <span class="spinner-border text-primary"></span>
                        <p class="mt-2">Verifying your email...</p>
                    </div>
                    <div *ngIf="status === EmailVerificationStatus.Success" class="alert alert-success">
                        <h5>Email Verified!</h5>
                        <p>Your email has been verified. <a routerLink="/account/login">Click here to login</a></p>
                    </div>
                    <div *ngIf="status === EmailVerificationStatus.Failed" class="alert alert-danger">
                        <h5>Verification Failed</h5>
                        <p>The verification token is invalid or expired.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
